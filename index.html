<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NKI Sushi</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HERO */

.hero {
    height: 60vh;
    background: url("https://images.unsplash.com/photo-1579871494447-9811cf80d66c") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

.hero button {
    background: #f5a623;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* NAV */

.nav {
    background: #1a1a1a;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.categories {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    background: #2a2a2a;
    padding: 10px;
}

.categories span {
    cursor: pointer;
    white-space: nowrap;
}

/* PRODUCTS */

.section {
    padding: 30px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #1c1c1c;
    border-radius: 10px;
    overflow: hidden;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 8px;
    height: 150px;
    object-fit: cover;
}

.card button {
    margin-top: 10px;
    background: #e60023;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
}

/* PANIER */

.cart {
    background: #141414;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

select, label {
    margin-top: 10px;
    display: block;
}

button.validate {
    margin-top: 20px;
    width: 100%;
    background: #f5a623;
    padding: 12px;
}

.success {
    color: #4CAF50;
    margin-top: 15px;
}

.error {
    color: red;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- HERO -->

<div class="hero">
    <div class="hero-content">
        <h1>NKI Sushi</h1>
        <p>Commandez vos plats préférés en quelques clics !</p>
        <button>Afficher les horaires</button>
    </div>
</div>

<!-- NAV -->

<div class="nav">
    <div>📍 20 Boulevard Gustave Chan</div>
    <div>🛒 <span id="cartCount">0</span> panier</div>
</div>

<div class="categories">
    <span>🥟 entrées</span>
    <span>🍱 lunch box</span>
    <span>🍣 sushi</span>
    <span>🍥 maki</span>
    <span>🥑 california</span>
</div>

<!-- PRODUITS -->

<div class="section">
    <h2>🥟 Entrées</h2>

    <div class="products">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1604908176997-431cfb8a0f74">
            <h3>Tempura</h3>
            <p>6€</p>
            <button onclick="addToCart('Tempura',6)">Ajouter</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1553621042-f6e147245754">
            <h3>Sushi Saumon</h3>
            <p>7€</p>
            <button onclick="addToCart('Sushi Saumon',7)">Ajouter</button>
        </div>
    </div>

    <!-- PANIER -->

    <div class="cart">
        <h2>Votre panier</h2>
        <ul id="cartList"></ul>
        <p>Total : <span id="total">0</span> €</p>

        <h3>Choix des sauces</h3>

        <label><input type="checkbox" class="sauce" value="Sucrée"> Sucrée</label>
        <label><input type="checkbox" class="sauce" value="Salée"> Salée</label>
        <label><input type="checkbox" class="sauce" value="Aigre douce"> Aigre douce</label>
        <label><input type="checkbox" class="sauce" value="Wasabi"> Wasabi</label>
        <label><input type="checkbox" class="sauce" value="Gingembre"> Gingembre</label>
        <label><input type="checkbox" id="noneSauce"> Aucune</label>

        <h3>Nombre de baguettes</h3>

        <select id="baguettes">
            <option value="">Choisir</option>
            <option value="1">1 paire</option>
            <option value="2">2 paires</option>
            <option value="3">3 paires</option>
            <option value="4">4+ paires</option>
        </select>

        <button class="validate" onclick="validateOrder()">Valider la commande</button>

        <p class="error" id="errorMsg"></p>
        <p class="success" id="successMsg"></p>

    </div>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    const cartList = document.getElementById("cartList");
    const totalSpan = document.getElementById("total");
    const cartCount = document.getElementById("cartCount");

    cartList.innerHTML = "";
    cart.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.name + " - " + item.price + "€";
        cartList.appendChild(li);
    });

    totalSpan.textContent = total;
    cartCount.textContent = cart.length;
}

const noneSauce = document.getElementById("noneSauce");
const sauceCheckboxes = document.querySelectorAll(".sauce");

noneSauce.addEventListener("change", () => {
    if (noneSauce.checked) {
        sauceCheckboxes.forEach(s => s.checked = false);
    }
});

sauceCheckboxes.forEach(s => {
    s.addEventListener("change", () => {
        if (s.checked) {
            noneSauce.checked = false;
        }
    });
});

function validateOrder() {
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    errorMsg.textContent = "";
    successMsg.textContent = "";

    if (cart.length === 0) {
        errorMsg.textContent = "Votre panier est vide.";
        return;
    }

    const saucesSelected = [...sauceCheckboxes].filter(s => s.checked);
    const baguettes = document.getElementById("baguettes").value;

    if (!noneSauce.checked && saucesSelected.length === 0) {
        errorMsg.textContent = "Choisissez au moins une sauce ou 'Aucune'.";
        return;
    }

    if (!baguettes) {
        errorMsg.textContent = "Choisissez le nombre de baguettes.";
        return;
    }

    successMsg.textContent = "Commande validée avec succès 🎉";
}
</script>

</body>
</html>
